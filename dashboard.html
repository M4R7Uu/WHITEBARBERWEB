<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAMOUZ BARBER — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --white: #ffffff; 
        --black: #000000; 
        --accent: #790BBE; /* Cambio: Morado Famouz */
        --accent-dim: #5c0891; 
        --gray: #f4f4f4; 
        --gray2: #e8e8e8; 
        --gray3: #bbb; 
        --orange: #ff6600;
        --font-d: 'Bebas Neue', sans-serif; 
        --font-b: 'Montserrat', sans-serif;
    }
    body { font-family: var(--font-b); background: var(--gray); color: var(--black); min-height: 100vh; display: flex; flex-direction: column; }

    /* LOGIN */
    #login-screen {
        position: fixed; inset: 0; background: var(--black);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; gap: 1.5rem;
    }
    .login-logo { font-family: var(--font-d); font-size: 2.5rem; color: var(--white); letter-spacing: 0.05em; }
    .login-logo span { color: var(--accent); }
    .login-box {
        background: #111; border: 1px solid #222; border-radius: 4px; padding: 2.5rem 2rem;
        width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 1rem;
    }
    .login-box input {
        width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333;
        color: var(--white); font-size: 0.9rem; outline: none;
    }
    #login-btn { width: 100%; padding: 0.9rem; background: var(--accent); color: var(--white); font-weight: 700; border: none; cursor: pointer; transition: background 0.3s; }
    #login-btn:hover { background: var(--accent-dim); }

    /* DASHBOARD */
    #dashboard { display: none; flex: 1; flex-direction: column; }
    .dash-header {
        background: var(--black); height: 64px; display: flex; 
        align-items: center; justify-content: space-between; padding: 0 2rem;
        position: sticky; top: 0; z-index: 100;
    }
    .dash-logo { font-family: var(--font-d); font-size: 1.4rem; color: var(--white); }
    .dash-logo span { color: var(--accent); }
    
    .btn-header {
        font-size: 0.7rem; font-weight: 700; color: var(--white);
        border: 1px solid #444; padding: 0.4rem 1rem; cursor: pointer; background: none;
        text-decoration: none; margin-left: 10px; transition: 0.2s;
    }
    .btn-header:hover { border-color: var(--white); }
    
    /* Botón Ver Sitio con el nuevo morado */
    .btn-view-site { border-color: var(--accent); color: var(--accent); }
    .btn-view-site:hover { background: var(--accent); color: var(--white); }

    .dash-main {
        max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem;
        display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; width: 100%;
    }
    .dash-card { background: var(--white); border-radius: 4px; padding: 1.8rem; border: 1px solid var(--gray2); }
    .dash-card-title { font-family: var(--font-d); font-size: 1.4rem; margin-bottom: 0.3rem; }

    /* SERVICIOS */
    .servicio-row {
        display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px;
        align-items: center; padding: 8px; border-bottom: 1px solid var(--gray2);
    }
    .servicio-input { padding: 0.55rem; border: 1px solid var(--gray2); font-size: 0.82rem; outline: none; width: 100%; }
    .btn-delete-srv { background: none; border: 1px solid var(--gray2); cursor: pointer; color: var(--gray3); padding: 5px; }
    .btn-delete-srv:hover { background: var(--accent); color: white; border-color: var(--accent); }
    
    .destacado-toggle { cursor: pointer; font-size: 1.2rem; user-select: none; color: #ddd; }
    .destacado-toggle:has(input:checked) { color: #FFD700; } /* Mantenemos dorado para estrellas */
    .destacado-toggle input { display: none; }

    /* GALERÍA DASHBOARD */
    .dash-galeria-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px; margin-top: 15px; max-height: 400px; overflow-y: auto;
    }
    .thumb-edit { position: relative; width: 100%; aspect-ratio: 1; border-radius: 4px; overflow: hidden; }
    .thumb-edit img { width: 100%; height: 100%; object-fit: cover; }
    .btn-del-img {
        position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.8);
        color: white; border: none; font-size: 9px; padding: 3px 6px; cursor: pointer; font-weight: 700;
    }
    .btn-del-img:hover { background: var(--accent); }

    /* UPLOAD */
    .upload-area {
        border: 2px dashed var(--gray2); border-radius: 4px; padding: 2.5rem 1rem;
        text-align: center; cursor: pointer; position: relative;
    }
    .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .btn-action { width: 100%; padding: 0.85rem; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-dim); }
    .btn-black { background: var(--black); color: white; }
    .btn-black:hover { opacity: 0.8; }

    /* STATS */
    .stat-box { background: var(--gray); border-radius: 4px; padding: 1.2rem; text-align: center; }
    .stat-num { font-family: var(--font-d); font-size: 2.2rem; color: var(--accent); }

    /* FOOTER (IFCODE) */
    .dash-footer { background: #f9f9f9; border-top: 1px solid var(--gray2); padding: 3rem 1rem; text-align: center; margin-top: auto; }
    .ifcode-brand { text-decoration: none; display: inline-flex; align-items: center; gap: 2px; font-family: var(--font-b); font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    .if-orange { color: var(--orange); }
    .code-black { color: var(--black); }
    .ifcode-glow { animation: glow-pulse-orange 3s infinite ease-in-out; }
    @keyframes glow-pulse-orange {
        0% { text-shadow: 0 0 0px rgba(255, 102, 0, 0); }
        50% { text-shadow: 0 0 15px rgba(255, 102, 0, 0.6); }
        100% { text-shadow: 0 0 0px rgba(255, 102, 0, 0); }
    }
    .footer-credits { font-size: 10px; font-weight: 700; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }

    @media (max-width: 768px) { .dash-main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-logo">FAMOUZ <span>BARBER</span></div>
  <div class="login-box">
    <input type="text" id="login-user" placeholder="USUARIO" autocomplete="off" />
    <input type="password" id="login-pass" placeholder="CONTRASEÑA" />
    <button id="login-btn">INGRESAR AL PANEL</button>
  </div>
</div>

<div id="dashboard">
  <header class="dash-header">
    <div class="dash-logo">FAMOUZ <span>BARBER</span></div>
    <div>
        <a href="index.html" target="_blank" class="btn-header btn-view-site">VER SITIO</a>
        <button class="btn-header" id="logout-btn">SALIR</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="dash-card">
      <p class="dash-card-title">RESUMEN</p>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
        <div class="stat-box"><div id="stat-fotos" class="stat-num">0</div><div style="font-size:10px; font-weight:700; color:#888;">FOTOS</div></div>
        <div class="stat-box"><div id="stat-servicios" class="stat-num">0</div><div style="font-size:10px; font-weight:700; color:#888;">SERVICIOS</div></div>
      </div>
    </div>

    <div class="dash-card">
      <p class="dash-card-title">GESTIÓN DE PRECIOS</p>
      <div id="servicios-list"></div>
      <div class="servicio-row" style="background:#f4f4f4; margin-top:15px; border-radius:4px;">
        <input type="text" id="new-nombre" class="servicio-input" placeholder="Ej: CORTE URBANO">
        <input type="text" id="new-precio" class="servicio-input" placeholder="Ej: $25.000">
        <button id="btn-add-srv" style="background:black; color:white; border:none; width:30px; height:30px; cursor:pointer;">+</button>
      </div>
      <button class="btn-action btn-black" id="guardar-btn">GUARDAR CAMBIOS EN LA NUBE</button>
    </div>

    <div class="dash-card">
      <p class="dash-card-title">SUBIR TRABAJOS</p>
      <div class="upload-area">
        <input type="file" id="file-input" accept="image/*">
        <div style="font-size:30px;">📁</div>
        <p style="font-weight:600; font-size:12px; margin-top:10px;">ARRASTRA TUS FOTOS AQUÍ</p>
      </div>
      <button class="btn-action btn-accent" id="upload-btn">SUBIR AHORA</button>
    </div>

    <div class="dash-card">
        <p class="dash-card-title">GALERÍA ACTUAL</p>
        <div id="dash-galeria" class="dash-galeria-grid"></div>
    </div>
  </main>

  <footer class="dash-footer">
    <a href="https://m4r7uu.github.io/-IF-CODE-WEB/" target="_blank" class="ifcode-brand">
        <span class="ifcode-glow"><span class="if-orange">IF</span><span class="code-black">CODE</span></span>
    </a>
    <div class="footer-credits">Digital Solutions & Web Development — 2026</div>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
      apiKey: "AIzaSyAOMgx7afX6HWDa41GNj0a1R_zfwwdGlcg",
      authDomain: "barberiaweb-551cc.firebaseapp.com",
      databaseURL: "https://barberiaweb-551cc-default-rtdb.firebaseio.com",
      projectId: "barberiaweb-551cc",
      messagingSenderId: "13699003279",
      appId: "1:13699003279:web:b6c1f8a3189d48895111fa"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const IMGBB_API_KEY = "1be9278e516561dff0fc823262b7cdcc";

  if (sessionStorage.getItem('v_admin_auth') === 'true') mostrarDashboard();

  document.getElementById('login-btn').addEventListener('click', () => {
      // Contraseña actualizada: barberwhite2026
      if (document.getElementById('login-user').value === 'admin' && document.getElementById('login-pass').value === 'barberwhite2026') {
          sessionStorage.setItem('v_admin_auth', 'true');
          mostrarDashboard();
      } else { alert('Credenciales incorrectas'); }
  });

  function mostrarDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      escucharServicios();
      escucharGaleria();
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('v_admin_auth');
      location.reload();
  });

  function escucharServicios() {
    db.ref('servicios').on('value', snap => {
      const data = snap.val();
      const container = document.getElementById('servicios-list');
      container.innerHTML = '';
      if (data) {
        Object.keys(data).forEach(id => {
          const srv = data[id];
          const row = document.createElement('div');
          row.className = 'servicio-row';
          row.dataset.id = id;
          row.innerHTML = `
            <input class="servicio-input nombre" type="text" value="${srv.nombre}">
            <input class="servicio-input precio" type="text" value="${srv.precio}">
            <button class="btn-delete-srv" onclick="eliminarSrv('${id}')">×</button>
            <label class="destacado-toggle">
              <input type="checkbox" ${srv.destacado ? 'checked' : ''} onchange="toggleStar(this)"> ★
            </label>
          `;
          container.appendChild(row);
        });
        document.getElementById('stat-servicios').textContent = Object.keys(data).length;
      }
    });
  }

  window.toggleStar = (el) => { 
      const id = el.closest('.servicio-row').dataset.id;
      db.ref(`servicios/${id}`).update({ destacado: el.checked });
  };

  window.eliminarSrv = (id) => { if(confirm('¿Borrar servicio?')) db.ref(`servicios/${id}`).remove(); };

  document.getElementById('btn-add-srv').addEventListener('click', () => {
    const n = document.getElementById('new-nombre'), p = document.getElementById('new-precio');
    if (n.value && p.value) {
      db.ref('servicios').push({ nombre: n.value, precio: p.value, destacado: false });
      n.value = ''; p.value = '';
    }
  });

  document.getElementById('guardar-btn').addEventListener('click', () => {
    const updates = {};
    document.querySelectorAll('#servicios-list .servicio-row').forEach(row => {
      updates[`/servicios/${row.dataset.id}`] = {
        nombre: row.querySelector('.nombre').value,
        precio: row.querySelector('.precio').value,
        destacado: row.querySelector('.destacado-toggle input').checked
      };
    });
    db.ref().update(updates).then(() => {
      const b = document.getElementById('guardar-btn');
      b.textContent = '✓ ACTUALIZADO'; b.style.background = '#790BBE';
      setTimeout(() => { b.textContent = 'GUARDAR CAMBIOS EN LA NUBE'; b.style.background = ''; }, 2000);
    });
  });

  function escucharGaleria() {
    db.ref('galeria').on('value', snap => {
      const data = snap.val();
      const container = document.getElementById('dash-galeria');
      container.innerHTML = '';
      if (data) {
        const ids = Object.keys(data);
        document.getElementById('stat-fotos').textContent = ids.length;
        ids.reverse().forEach(id => {
          const div = document.createElement('div');
          div.className = 'thumb-edit';
          div.innerHTML = `<img src="${data[id].src}"><button class="btn-del-img" onclick="eliminarFoto('${id}')">BORRAR</button>`;
          container.appendChild(div);
        });
      } else { document.getElementById('stat-fotos').textContent = "0"; }
    });
  }

  window.eliminarFoto = (id) => { if(confirm('¿Eliminar foto?')) db.ref(`galeria/${id}`).remove(); };

  document.getElementById('upload-btn').addEventListener('click', async () => {
      const fileInput = document.getElementById('file-input');
      const file = fileInput.files[0];
      if (!file) return alert("Selecciona foto");
      const btn = document.getElementById('upload-btn');
      btn.disabled = true; btn.textContent = "CARGANDO...";
      const formData = new FormData();
      formData.append("image", file);
      try {
          const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
          const res = await resp.json();
          if (res.success) {
              await db.ref('galeria').push({ src: res.data.url, timestamp: Date.now() });
              alert("✓ Publicado");
              fileInput.value = "";
          }
      } catch (e) { alert("Error al subir"); }
      finally { btn.disabled = false; btn.textContent = "SUBIR AHORA"; }
  });
</script>
</body>
</html>
